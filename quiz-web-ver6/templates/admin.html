<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>司会者画面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- ▼ Socket.IO と QRCode を head に移動（重要） ▼ -->
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* ▼ 背景は body のみが持つ（絶対に1枚だけ） ▼ */
        body.start_page {
            background-image: url("/static/img/back1.png");
            background-size: cover;
            background-position: center;
        }
        body.main_page {
            background-image: url("/static/img/back2.png");
            background-size: cover;
            background-position: center;
        }

        body {
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* ▼ QRコード部分（背景は黒カードのみ） ▼ */
        #qr_area {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 40px;
            border-radius: 20px;
            display: none;
        }

        #qrcode {
            width: 600px !important;
            height: 600px !important;
        }

        #qr_url {
            margin-top: 20px;
            font-size: 28px;
            color: #0ff;
        }

        #control {
            position: fixed;
            top: 0;
            right: 0;
            padding: 10px;
            text-align: right;
            display: none;
        }

        #control button {
            display: block;
            margin: 5px 0;
            padding: 10px 20px;
            font-size: 20px;
        }

        /* ▼ ステージ表示（半透明黒カード） ▼ */
        #stage_box {
            margin-top: 150px;
            font-size: 40px;
            display: none;
            padding: 40px;
            border-radius: 20px;
            background: rgba(0,0,0,0.55);
        }

        /* ▼ index と同じ：問題文カード（白） ▼ */
        #question {
            display: none;
            max-width: 90%;
            background: #ffffff;
            color: #000000;
            padding: 20px 30px;
            border-radius: 16px;
            border: 3px solid #333;
            box-shadow: 0 0 18px rgba(0,0,0,0.6);
            font-size: 32px;
            font-weight: bold;
            margin: 40px auto 20px auto;
        }

        /* ▼ index と同じ：選択肢グリッド（背景なし） ▼ */
        #choices_grid {
            display: none;
            margin-top: 20px;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ▼ index と同じ：選択肢カード（白） ▼ */
        .choice_btn {
            padding: 16px 14px;
            font-size: 24px;
            background: #ffffff;
            border: 3px solid #333;
            border-radius: 16px;
            color: #000000;
            box-shadow: 0 0 16px rgba(0,0,0,0.6);

            display: flex;
            flex-direction: column;
            align-items: flex-start;

            min-height: 150px;
            max-height: 260px;
            overflow: hidden;
        }

        .choice_label_row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ▼ 色付き丸の中に白数字（1,2,3,4） ▼ */
        .choice_mark {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            flex-shrink: 0;
        }

        .choice_mark_A { background-color: #007bff; }
        .choice_mark_B { background-color: #ff3b30; }
        .choice_mark_C { background-color: #34c759; }
        .choice_mark_D { background-color: #ffcc00; }

        .choice_label_text {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
        }

        .choice_img {
            margin-top: 10px;
            max-height: 120px;
            max-width: 100%;
            width: auto;
            border-radius: 12px;
            object-fit: contain;
            align-self: center;
        }

        .choice_text_only {
            margin-top: 10px;
            font-size: 22px;
            color: #000000;
        }

        .vote_count {
            margin-top: 10px;
            font-size: 24px;
            color: #0ff;
            font-weight: bold;
        }

        .correct_choice {
            border: 4px solid yellow !important;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1.0); }
            50% { opacity: 0.2; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1.0); }
        }

        /* ▼ ランキング ▼ */
        #ranking_title {
            margin-top: 40px;
            font-size: 30px;
            display: none;
        }

        #ranking {
            margin-top: 10px;
            height: calc(100vh - 200px);
            display: none;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
        }

        #final_ranking_title {
            margin-top: 80px;
            font-size: 36px;
            display: none;
        }

        #final_ranking {
            margin-top: 20px;
            height: calc(100vh - 200px);
            display: none;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
        }

        .rank_item {
            width: 60%;
            max-width: 900px;
            margin: 8px auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: linear-gradient(90deg, rgba(0,40,80,0.9), rgba(0,120,200,0.9));
            border-radius: 14px;
            border: 2px solid rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 18px rgba(0, 200, 255, 0.7);
            font-size: 26px;
            opacity: 0;
            transform: translateY(200px);
            animation: slideUp 0.5s forwards;
        }

        .rank_item.rank_1 {
            border-color: #ffd700;
            box-shadow: 0 0 26px rgba(255, 215, 0, 0.9);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(200px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #reset_button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 22px;
            font-size: 18px;
            background: #444;
            color: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.8;
            z-index: 9999;
            display: none;
        }
    </style>
</head>

<body class="start_page">

<!-- ▼ 開始ページ ▼ -->
<div id="start_page" style="margin-top:200px;">
    <button onclick="goQR()" style="padding:20px 60px;font-size:40px;border-radius:20px;">開始</button>
</div>

<!-- ▼ QRコード ▼ -->
<div id="qr_area">
    <h2>参加者用 QR コード</h2>
    <div id="qrcode"></div>
    <div id="qr_url"></div>
</div>

<!-- ▼ 操作ボタン ▼ -->
<div id="control">
    <button onclick="nextStage()">次へ</button>
    <button onclick="finishQuiz()">締め切り</button>
</div>

<button id="reset_button" onclick="resetQuiz()">Reset</button>

<!-- ▼ ステージ表示 ▼ -->
<div id="stage_box">
    <div id="stage_title"></div>
    <div id="stage_text"></div>
</div>

<!-- ▼ index と同じ：問題文カード ▼ -->
<div id="question"></div>

<!-- ▼ index と同じ：選択肢グリッド ▼ -->
<div id="choices_grid"></div>

<!-- ▼ ランキング ▼ -->
<h2 id="ranking_title">ランキング</h2>
<div id="ranking"></div>
<!-- ▼ 総合ランキング ▼ -->
<h2 id="final_ranking_title">総合ランキング</h2>
<div id="final_ranking"></div>

<script>
    const joinUrl = window.location.origin;

    /* ▼ QRページへ切り替え ▼ */
    function goQR(){
        document.body.classList.remove("start_page");
        document.body.classList.add("main_page");

        document.getElementById("start_page").style.display = "none";
        document.getElementById("qr_area").style.display = "block";
        document.getElementById("control").style.display = "block";
        document.getElementById("reset_button").style.display = "block";
    }

    /* ▼ QRコード生成 ▼ */
    new QRCode(document.getElementById("qrcode"), {
        text: joinUrl,
        width: 600,
        height: 600
    });
    document.getElementById("qr_url").textContent = joinUrl;

    /* ▼ Socket.IO 接続（head に移動済み） ▼ */
    const socket = io({ transports: ["polling"] });

    let currentStage = 0;

    function nextStage(){ socket.emit("next_stage"); }
    function finishQuiz(){ socket.emit("finish_quiz"); }

    function removeFinalButton(){
        const btn = document.getElementById("final_button");
        if(btn) btn.remove();
    }

    function showFinalButton(){
        removeFinalButton();
        const btn = document.createElement("button");
        btn.id = "final_button";
        btn.textContent = "総合ランキングへ";
        btn.style.background = "#ff0";
        btn.style.color = "#000";
        btn.style.fontWeight = "bold";
        btn.style.marginTop = "10px";
        btn.onclick = () => socket.emit("next_stage");
        document.getElementById("control").appendChild(btn);
    }

    function showResultButton(){
        const old = document.getElementById("result_button");
        if(old) old.remove();

        const btn = document.createElement("button");
        btn.id = "result_button";
        btn.textContent = "結果";
        btn.style.background = "#f00";
        btn.style.color = "#fff";
        btn.style.fontWeight = "bold";
        btn.style.fontSize = "26px";
        btn.style.marginTop = "10px";
        btn.style.padding = "10px 30px";

        btn.onclick = () => {
            socket.emit("show_correct");
            btn.remove();
        };

        document.getElementById("control").appendChild(btn);
    }

    function showGoRankingButton(){
        const old = document.getElementById("go_ranking_button");
        if(old) old.remove();

        const btn = document.createElement("button");
        btn.id = "go_ranking_button";
        btn.textContent = "ランキングへ";
        btn.style.background = "#ff0";
        btn.style.color = "#000";
        btn.style.fontWeight = "bold";
        btn.style.fontSize = "26px";
        btn.style.marginTop = "10px";
        btn.style.padding = "10px 30px";

        btn.onclick = () => {
            socket.emit("finish_quiz_after_vote");
            btn.remove();
        };

        document.getElementById("control").appendChild(btn);
    }

    /* ▼ 色付き丸の中に白数字（1,2,3,4） ▼ */
    const markMap = { "A": "1", "B": "2", "C": "3", "D": "4" };

    /* ▼ ステージ表示 ▼ */
    socket.on("show_stage", data => {
        currentStage = data.stage;

        document.getElementById("qr_area").style.display = "none";
        document.getElementById("question").style.display = "none";
        document.getElementById("choices_grid").style.display = "none";
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";
        document.getElementById("final_ranking_title").style.display = "none";
        document.getElementById("final_ranking").style.display = "none";

        const box = document.getElementById("stage_box");
        const title = document.getElementById("stage_title");
        const text = document.getElementById("stage_text");

        box.style.display = "block";

        if(currentStage === 1){
            title.innerText = "ちゃんと聞いてたか問題";
            text.innerHTML = `
                <p>1. 早押しクイズです</p>
                <p>2. 正解するとポイントが入ります</p>
                <p>3. 最後に総合ランキングを発表します</p>
            `;
        }
        else if(currentStage === 2){
            title.innerText = "練習問題";
            text.innerHTML = "これから練習問題を1問出します。";
        }
        else if(currentStage === 4){
            title.innerText = "本問題";
            text.innerHTML = "ここから本番5問が始まります。";
        }
    });

    /* ▼ 問題表示 ▼ */
    socket.on("show_question", data => {
        currentStage = data.stage;

        document.getElementById("stage_box").style.display = "none";
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";

        const q = document.getElementById("question");
        q.style.display = "block";
        q.textContent = data.text;

        const grid = document.getElementById("choices_grid");
        grid.style.display = "grid";

        let html = "";

        for(const key in data.choices){
            const v = data.choices[key];
            const num = markMap[key];

            html += `
                <div class="choice_btn" id="choice_${key}">
                    <div class="choice_label_row">
                        <div class="choice_mark choice_mark_${key}">
                            ${num}
                        </div>
                        <div class="choice_label_text">${v.label}</div>
                    </div>

                    ${
                        v.img
                        ? `<img src="${v.img}" class="choice_img">`
                        : `<div class="choice_text_only">${v.label}</div>`
                    }
                </div>
            `;
        }

        grid.innerHTML = html;
    });

    /* ▼ 投票結果 ▼ */
    socket.on("vote_result", vote => {
        for(const key in vote){
            const div = document.getElementById("choice_" + key);
            if(div){
                div.innerHTML += `<div class="vote_count">投票数：${vote[key]}</div>`;
            }
        }
        showResultButton();
    });

    /* ▼ 正解表示 ▼ */
    socket.on("correct_choice", data => {
        const correct = data.correct_choice;

        if(correct === "ALL"){
            document.querySelectorAll(".choice_btn").forEach(div => {
                div.classList.add("correct_choice");
            });
            showGoRankingButton();
            return;
        }

        const div = document.getElementById("choice_" + correct);
        if(div){
            div.classList.add("correct_choice");
        }

        showGoRankingButton();
    });

    /* ▼ ランキング ▼ */
    socket.on("ranking", list => {
        document.getElementById("question").style.display = "none";
        document.getElementById("choices_grid").style.display = "none";
        document.getElementById("ranking_title").style.display = "block";

        const container = document.getElementById("ranking");
        container.style.display = "flex";
        container.innerHTML = "";

        const total = Math.min(list.length, 10);
        const reversed = [...list].slice(0, total).reverse();

        let index = 0;

        function showNext(){
            if(index >= reversed.length){
                if(currentStage === 9){
                    showFinalButton();
                }
                return;
            }

            const item = reversed[index];
            const rank = total - index;

            const div = document.createElement("div");
            div.classList.add("rank_item");
            if(rank === 1){
                div.classList.add("rank_1");
                div.style.animation = "blink 1s infinite, slideUp 0.5s forwards";
            }

            div.innerHTML = `
                <div class="rank_no">${rank}位</div>
                <div class="rank_name">${item.name}</div>
                <div class="rank_time">${item.time.toFixed(3)} 秒</div>
            `;

            container.appendChild(div);
            index++;

            let delay = 500;
            if(rank <= 4 && rank >= 3) delay = 700;
            if(rank === 2) delay = 700;
            if(rank === 1) delay = 1500;

            setTimeout(showNext, delay);
        }

        showNext();
    });

    /* ▼ 総合ランキング ▼ */
    socket.on("final_ranking", list => {
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";

        const container = document.getElementById("final_ranking");
        container.style.display = "flex";
        container.innerHTML = "";

        document.getElementById("final_ranking_title").style.display = "block";

        const total = Math.min(list.length, 10);
        const reversed = [...list].slice(0, total).reverse();

        let index = 0;

        function showNext(){
            if(index >= reversed.length) return;

            const item = reversed[index];
            const rank = total - index;

            const div = document.createElement("div");
            div.classList.add("rank_item");
            if(rank === 1){
                div.classList.add("rank_1");
                div.style.animation = "blink 1s infinite, slideUp 0.5s forwards";
            }

            div.innerHTML = `
                <div class="rank_no">${rank}位</div>
                <div class="rank_name">${item.name}</div>
                <div class="rank_time">${item.points.toFixed(1)} pt</div>
            `;

            container.appendChild(div);
            index++;

            let delay = 500;
            if(rank <= 4 && rank >= 3) delay = 800;
            if(rank === 2) delay = 1000;
            if(rank === 1) delay = 1800;

            setTimeout(showNext, delay);
        }

        showNext();
    });

    /* ▼ リセット ▼ */
    function resetQuiz(){
        if(confirm("本当にリセットしますか？\n（全ての進行状況が消えます）")){
            socket.emit("reset_quiz");
        }
    }

    socket.on("quiz_reset", () => {
        location.reload();
    });

</script>

</body>
</html>
